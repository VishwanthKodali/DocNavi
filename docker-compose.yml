version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docnavi_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__STORAGE__USE_HDD: "false"
      QDRANT__LOG__LEVEL: "info"
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docnavi_app
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      BACKEND_URL: "http://localhost:8000"
      QDRANT_URL: "http://qdrant:6333"
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000 --reload &
             streamlit run frontend.py --server.port 8501 --browser.gatherUsageStats false --server.headless true"

volumes:
  qdrant_data: